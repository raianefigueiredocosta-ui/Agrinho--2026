<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroSustentável - O Futuro da Terra</title>
    <style>
        /* Configurações Gerais */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #F5F7F8;
            color: #3E2723;
        }

        /* Hero Section com Imagem Realista */
        .hero {
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(30, 63, 32, 0.7)), 
                        url('https://images.unsplash.com/photo-1500937386664-56d1dfef3854?auto=format&fit=crop&w=1920&q=80') no-repeat center center/cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            color: #FFFFFF;
        }

        .hero h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 600px;
            margin-bottom: 30px;
            font-weight: 300;
        }

        /* Botão Elegante */
        .btn-agro {
            background-color: #D4AF37;
            color: #1E3F20;
            padding: 12px 30px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-agro:hover {
            background-color: #1E3F20;
            color: #FFFFFF;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>AGRONEGÓCIO FORTE & SUSTENTÁVEL</h1>
        <p>Alimentando o mundo com a força da tecnologia e o respeito à nossa maior riqueza: a terra.</p>
        <button class="btn-agro">Explore Nossas Soluções</button>
    </section>

</body>
</html>
